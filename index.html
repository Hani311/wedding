<!doctype html>
<html lang="%HTML_LANG%" dir="%HTML_DIR%">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%APP_TITLE%</title>
    <meta name="description" content="%APP_DESC%" />

    <!-- Private invite: keep it out of search results. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#fbf9f4" />

    <!-- Link-preview card for WhatsApp / iMessage / etc. (filled per language
         at build time; URLs are absolute to the GitHub Pages address). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="%APP_TITLE%" />
    <meta property="og:description" content="%OG_DESC%" />
    <meta property="og:image" content="%OG_IMAGE%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="%OG_URL%" />
    <meta property="og:locale" content="%OG_LOCALE%" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%APP_TITLE%" />
    <meta name="twitter:description" content="%OG_DESC%" />
    <meta name="twitter:image" content="%OG_IMAGE%" />

    <!-- Hero animation data — preload so the download overlaps JS parse. -->
    <link rel="preload" as="fetch" href="%BASE_URL%envelope.json" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@0;1&family=Inter&family=Pinyon+Script&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <!--%ARABIC_FONT%-->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
